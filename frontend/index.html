<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hookah Stock Manager</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫧</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif}
        body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#E8E6F0;min-height:100vh;background-attachment:fixed}
        .container{max-width:1300px;margin:0 auto;padding:20px}
        .header{background:rgba(30,27,46,0.95);backdrop-filter:blur(20px);padding:30px;border-radius:25px;margin-bottom:30px;border:1px solid rgba(187,134,252,0.2);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
        .header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
        .header h1{font-size:2.5em;background:linear-gradient(135deg,#BB86FC,#64FFDA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;gap:15px}
        .user-info{display:flex;align-items:center;gap:15px;flex-wrap:wrap}
        .user-badge{padding:8px 16px;border-radius:20px;font-size:0.85em;font-weight:600;background:rgba(187,134,252,0.2);color:#BB86FC;border:1px solid rgba(187,134,252,0.3);display:flex;align-items:center;gap:8px}
        .user-badge.guest{background:rgba(100,255,218,0.1);color:#64FFDA;border-color:rgba(100,255,218,0.3)}
        .btn-logout{padding:8px 16px;background:rgba(255,82,82,0.2);color:#FF5252;border:1px solid rgba(255,82,82,0.3);border-radius:20px;cursor:pointer;font-size:0.85em;font-weight:600;transition:all 0.3s}
        .btn-logout:hover{background:rgba(255,82,82,0.4)}
        .status-badge{padding:8px 16px;border-radius:20px;font-size:0.85em;font-weight:600;background:rgba(0,230,118,0.1);color:#00E676;border:1px solid rgba(0,230,118,0.3)}
        .status-badge.offline{background:rgba(255,82,82,0.1);color:#FF5252;border-color:rgba(255,82,82,0.3)}
        .tabs{display:flex;gap:10px;margin-bottom:25px;background:rgba(30,27,46,0.9);backdrop-filter:blur(20px);padding:6px;border-radius:18px;border:1px solid rgba(187,134,252,0.2);flex-wrap:wrap}
        .tab-btn{padding:14px 28px;background:transparent;border:none;color:#9E9E9E;border-radius:14px;cursor:pointer;font-weight:600;transition:all 0.3s;font-size:0.95em}
        .tab-btn.active{background:linear-gradient(135deg,#BB86FC,#9966CC);color:white;box-shadow:0 10px 25px rgba(187,134,252,0.3)}
        .tab-btn:hover:not(.active){background:rgba(187,134,252,0.1);color:#E8E6F0}
        .tab-badge{background:#FF5252;color:white;padding:2px 8px;border-radius:12px;font-size:0.75em;margin-left:8px}
        .actions{display:flex;gap:15px;margin-bottom:30px;flex-wrap:wrap}
        .btn{padding:15px 30px;border:none;border-radius:15px;font-weight:600;cursor:pointer;font-size:0.95em;transition:all 0.3s;display:flex;align-items:center;gap:10px;letter-spacing:0.3px}
        .btn:disabled{opacity:0.4;cursor:not-allowed}
        .btn-buy{background:linear-gradient(135deg,#00BFA5,#00E676);color:#0f0c29}
        .btn-spend{background:linear-gradient(135deg,#FF5252,#FF1744);color:white}
        .btn-export{background:linear-gradient(135deg,#448AFF,#2979FF);color:white}
        .btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 15px 30px rgba(0,0,0,0.4)}
        .search-bar{background:rgba(30,27,46,0.9);backdrop-filter:blur(20px);padding:20px;border-radius:18px;margin-bottom:25px;border:1px solid rgba(187,134,252,0.2);display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
        .search-input-wrap{flex:1;min-width:200px}
        .search-input{width:100%;padding:14px 20px;background:rgba(19,17,28,0.8);border:1px solid rgba(187,134,252,0.3);border-radius:12px;color:#E8E6F0;font-size:1em;transition:all 0.3s}
        .search-input:focus{outline:none;border-color:#BB86FC;box-shadow:0 0 20px rgba(187,134,252,0.2)}
        .tag-filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding-top:5px}
        .tag-filter-btn{padding:6px 12px;border-radius:20px;border:1px solid rgba(187,134,252,0.3);background:rgba(187,134,252,0.1);color:#BB86FC;cursor:pointer;font-size:0.75em;font-weight:600;transition:all 0.3s;white-space:nowrap}
        .tag-filter-btn.active{background:#BB86FC;color:#0f0c29;border-color:#BB86FC}
        .tag-filter-btn:hover{background:rgba(187,134,252,0.3)}
        .tag-filter-clear{padding:6px 12px;border-radius:20px;border:1px solid rgba(255,82,82,0.3);background:rgba(255,82,82,0.1);color:#FF5252;cursor:pointer;font-size:0.75em;font-weight:600;transition:all 0.3s}
        .tag-filter-clear:hover{background:rgba(255,82,82,0.3)}
        .inventory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
        .card{background:rgba(30,27,46,0.9);backdrop-filter:blur(20px);border-radius:20px;padding:25px;border:1px solid rgba(187,134,252,0.2);transition:all 0.4s;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#BB86FC,#64FFDA);transform:scaleX(0);transition:transform 0.4s}
        .card:hover::before{transform:scaleX(1)}
        .card:hover{border-color:rgba(187,134,252,0.5);transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
        .card.out-of-stock{opacity:0.5;border-color:rgba(255,82,82,0.3)}
        .card.out-of-stock::before{background:linear-gradient(90deg,#FF5252,#FF1744)}
        .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:15px}
        .brand{color:#BB86FC;font-weight:700;font-size:0.85em;text-transform:uppercase;letter-spacing:2px;background:rgba(187,134,252,0.1);padding:4px 12px;border-radius:10px;display:inline-block}
        .flavor{font-size:1.5em;font-weight:700;margin:12px 0;line-height:1.2}
        .tags-container{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
        .tag{display:inline-block;padding:3px 10px;border-radius:15px;font-size:0.7em;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
        .tag-edit-btn{padding:3px 8px;border-radius:15px;font-size:0.65em;cursor:pointer;background:rgba(187,134,252,0.15);color:#BB86FC;border:1px dashed rgba(187,134,252,0.4);font-weight:600;transition:all 0.3s;white-space:nowrap}
        .tag-edit-btn:hover{background:rgba(187,134,252,0.3);border-style:solid}
        .weight-info{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
        .weight-badge{display:inline-block;background:rgba(187,134,252,0.15);padding:6px 14px;border-radius:25px;font-size:0.85em;color:#BB86FC;border:1px solid rgba(187,134,252,0.3)}
        .stock-bar{background:rgba(19,17,28,0.8);border-radius:12px;padding:15px;margin-top:15px}
        .stock-info{display:flex;justify-content:space-between;align-items:center}
        .stock-amount{font-size:1.8em;font-weight:700;background:linear-gradient(135deg,#64FFDA,#00E676);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .out-badge{position:absolute;top:20px;right:20px;background:linear-gradient(135deg,#FF5252,#FF1744);color:white;padding:8px 16px;border-radius:25px;font-size:0.85em;font-weight:700;box-shadow:0 5px 15px rgba(255,82,82,0.4)}
        .card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
        .btn-sm{padding:8px 16px;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:0.8em;transition:all 0.3s;display:flex;align-items:center;gap:5px}
        .btn-sm:disabled{opacity:0.3;cursor:not-allowed}
        .btn-clear-one{background:rgba(255,145,0,0.2);color:#FF9100;border:1px solid rgba(255,145,0,0.3)}
        .btn-clear-one:hover:not(:disabled){background:rgba(255,145,0,0.4);transform:scale(1.05)}
        .btn-clear-all{background:rgba(255,82,82,0.2);color:#FF5252;border:1px solid rgba(255,82,82,0.3)}
        .btn-clear-all:hover:not(:disabled){background:rgba(255,82,82,0.4);transform:scale(1.05)}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:35px}
        .stat-card{background:rgba(30,27,46,0.9);backdrop-filter:blur(20px);padding:25px;border-radius:20px;border:1px solid rgba(187,134,252,0.2);text-align:center;transition:all 0.3s;cursor:pointer}
        .stat-card:hover{transform:translateY(-5px);box-shadow:0 15px 30px rgba(0,0,0,0.4);border-color:rgba(187,134,252,0.5);background:rgba(40,35,60,0.95)}
        .stat-icon{font-size:2.5em;margin-bottom:10px}
        .stat-value{font-size:2.2em;font-weight:700;background:linear-gradient(135deg,#BB86FC,#64FFDA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:10px 0}
        .stat-label{color:#9E9E9E;font-size:0.9em;text-transform:uppercase;letter-spacing:1px}
        .stat-hint{color:#64FFDA;font-size:0.75em;margin-top:8px}
        .detail-table{width:100%;border-collapse:collapse;background:rgba(30,27,46,0.9);border-radius:15px;overflow:hidden}
        .detail-table th{padding:14px;text-align:left;color:#BB86FC;background:rgba(187,134,252,0.1);border-bottom:2px solid #3D2F5C;font-weight:600}
        .detail-table td{padding:12px 14px;color:#E8E6F0;border-bottom:1px solid #2D1F3D}
        .log-entry{background:rgba(30,27,46,0.9);backdrop-filter:blur(20px);padding:16px 22px;border-radius:15px;margin-bottom:10px;border:1px solid rgba(187,134,252,0.2)}
        .log-time{color:#BB86FC;font-weight:600;margin-right:12px;font-size:0.9em}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);justify-content:center;align-items:center;z-index:1000}
        .modal.open{display:flex}
        .modal-content{background:rgba(30,27,46,0.98);padding:35px;border-radius:25px;width:520px;max-width:90%;border:1px solid rgba(187,134,252,0.3);box-shadow:0 30px 60px rgba(0,0,0,0.6);max-height:90vh;overflow-y:auto}
        .modal-content h2{color:#BB86FC;margin-bottom:30px;font-size:1.8em;text-align:center}
        .input-group{margin-bottom:25px}
        .input-group label{display:block;color:#BB86FC;margin-bottom:10px;font-size:0.9em;font-weight:600;letter-spacing:1px}
        .input-group input{width:100%;padding:14px 18px;background:rgba(19,17,28,0.8);border:1px solid rgba(187,134,252,0.3);border-radius:12px;color:#E8E6F0;font-size:1em;transition:all 0.3s}
        .input-group input:focus{outline:none;border-color:#BB86FC;box-shadow:0 0 20px rgba(187,134,252,0.2)}
        .modal-actions{display:flex;gap:15px;margin-top:30px}
        .btn-cancel{background:transparent;border:1px solid rgba(187,134,252,0.3);color:#9E9E9E;flex:1}
        .btn-submit{flex:2}
        .tags-input-wrap{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
        .tags-input{flex:1;min-width:150px;padding:12px 16px;background:rgba(19,17,28,0.8);border:1px solid rgba(187,134,252,0.3);border-radius:12px;color:#E8E6F0;font-size:0.9em;transition:all 0.3s}
        .tags-input:focus{outline:none;border-color:#BB86FC}
        .btn-add-tag{padding:12px 20px;background:rgba(187,134,252,0.2);color:#BB86FC;border:1px solid rgba(187,134,252,0.3);border-radius:12px;cursor:pointer;font-weight:600;font-size:0.9em;white-space:nowrap;transition:all 0.3s}
        .btn-add-tag:hover{background:rgba(187,134,252,0.4)}
        .selected-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
        .selected-tag{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:0.8em;font-weight:600}
        .selected-tag-remove{cursor:pointer;font-weight:700;opacity:0.7;transition:all 0.2s}
        .selected-tag-remove:hover{opacity:1;transform:scale(1.2)}
        .toast{position:fixed;bottom:30px;right:30px;background:rgba(0,230,118,0.95);color:#0f0c29;padding:16px 24px;border-radius:15px;font-weight:600;transform:translateY(150%);transition:transform 0.4s;z-index:2000;box-shadow:0 10px 25px rgba(0,230,118,0.3)}
        .toast.show{transform:translateY(0)}
        .toast.error{background:rgba(255,82,82,0.95);color:white}
        .loading{display:inline-block;width:20px;height:20px;border:3px solid rgba(187,134,252,0.2);border-radius:50%;border-top-color:#BB86FC;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .login-box{background:rgba(30,27,46,0.98);padding:40px;border-radius:25px;width:420px;max-width:100%;border:1px solid rgba(187,134,252,0.3);box-shadow:0 30px 60px rgba(0,0,0,0.6);text-align:center}
        .login-box h2{color:#BB86FC;margin-bottom:10px;font-size:2em}
        .login-box .hint{color:#9E9E9E;margin-bottom:30px;font-size:0.9em;line-height:1.6}
        .login-box .hint span{color:#64FFDA;font-weight:600}
        .guest-badge{display:inline-block;background:rgba(100,255,218,0.1);color:#64FFDA;padding:4px 12px;border-radius:15px;font-size:0.8em;margin-top:10px;border:1px solid rgba(100,255,218,0.3)}
        @media(max-width:768px){.container{padding:10px}.header h1{font-size:1.8em}.tabs{overflow-x:auto}.actions{flex-direction:column}.btn{justify-content:center;padding:15px}.inventory-grid{grid-template-columns:1fr}.modal-content{padding:25px}}
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h1 style="font-size:4em;margin-bottom:10px;">🫧</h1>
            <h2>Hookah Stock Manager</h2>
            <p class="hint">Для ознакомительного просмотра:<br><span>test / test</span></p>
            <div class="input-group"><label>Логин</label><input type="text" id="loginUsername" placeholder="Введите логин..." autocomplete="off"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="loginPassword" placeholder="Введите пароль..." onkeydown="if(event.key==='Enter')login()"></div>
            <button class="btn btn-buy" onclick="login()" style="width:100%;justify-content:center;">🔐 Войти</button>
            <div id="loginError" style="color:#FF5252;margin-top:15px;display:none;"></div>
        </div>
    </div>

    <div id="appPage" style="display:none;">
        <div class="container">
            <div class="header">
                <div class="header-top">
                    <h1>🫧 Hookah Stock Manager</h1>
                    <div class="user-info">
                        <div class="user-badge" id="userBadge">👤 <span id="userName"></span></div>
                        <button class="btn-logout" onclick="logout()">🚪 Выйти</button>
                        <div class="status-badge" id="statusBadge"><span class="loading" style="width:12px;height:12px;border-width:2px;"></span> Подключение...</div>
                    </div>
                </div>
                <p style="color:#9E9E9E;margin-top:10px;">Система управления складом табака • Учёт • Аналитика</p>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('stock')">📦 Склад<span class="tab-badge" id="stockCount" style="display:none;">0</span></button>
                <button class="tab-btn" onclick="switchTab('stats')">📊 Статистика</button>
                <button class="tab-btn" onclick="switchTab('log')">📋 История</button>
            </div>
            <div id="stockView">
                <div class="search-bar">
                    <div class="search-input-wrap"><input type="text" class="search-input" placeholder="🔍 Поиск по бренду, вкусу или тегу..." oninput="filterInventory()" id="searchInput"></div>
                    <div class="tag-filters" id="tagFilter"></div>
                </div>
                <div class="actions">
                    <button class="btn btn-buy" id="btnBuy" onclick="openModal('buy')">📥 Закуп</button>
                    <button class="btn btn-spend" id="btnSpend" onclick="openModal('spend')">📤 Расход</button>
                    <button class="btn btn-export" onclick="exportToExcel()">📥 Скачать Excel</button>
                </div>
                <div class="inventory-grid" id="inventoryContainer"><div style="text-align:center;padding:50px;color:#9E9E9E;grid-column:1/-1;"><div class="loading"></div><p style="margin-top:20px;">Загрузка...</p></div></div>
            </div>
            <div id="statsView" style="display:none;">
                <div class="stats-grid" id="statsContainer"></div>
                <div id="detailView" style="display:none;margin-top:25px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:15px;">
                        <h3 style="color:#BB86FC;margin:0;" id="detailTitle">Детали</h3>
                        <button class="btn btn-cancel" onclick="closeDetail()" style="padding:10px 20px;font-size:0.85em;">← Назад</button>
                    </div>
                    <div id="detailContent" style="overflow-x:auto;"></div>
                </div>
                <div id="topSpentSection"><h3 style="margin:25px 0;color:#BB86FC;">🔝 Топ-10 расходуемых вкусов</h3><div id="topSpentContainer"></div></div>
            </div>
            <div id="logView" style="display:none;"><div id="logContainer"><div style="text-align:center;padding:50px;color:#9E9E9E;"><div class="loading"></div><p style="margin-top:20px;">Загрузка...</p></div></div></div>
        </div>
    </div>

    <!-- Модалка закуп/расход -->
    <div class="modal" id="operationModal">
        <div class="modal-content">
            <h2 id="modalTitle">Операция</h2>
            <div class="input-group"><label>Бренд</label><input type="text" id="brandInput" list="brandList" placeholder="Начните вводить..." autocomplete="off"><datalist id="brandList"></datalist></div>
            <div class="input-group"><label>Вкус</label><input type="text" id="flavorInput" list="flavorList" placeholder="Выберите или введите новый..." autocomplete="off"><datalist id="flavorList"></datalist></div>
            <div class="input-group"><label>Граммовка (г)</label><input type="number" id="weightInput" list="weightList" placeholder="250" value="250" min="1"><datalist id="weightList"><option value="40"><option value="100"><option value="200"><option value="250"><option value="500"><option value="1000"></datalist></div>
            <div class="input-group"><label>Количество упаковок</label><input type="number" id="qtyInput" value="1" min="1"></div>
            <div class="input-group" id="tagsGroup" style="display:none;">
                <label>🏷️ Теги вкусов (вводите и нажимайте Добавить)</label>
                <div class="tags-input-wrap">
                    <input type="text" class="tags-input" id="tagInput" placeholder="Например: Малина" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag();}">
                    <button class="btn-add-tag" onclick="addTag()">+ Добавить</button>
                </div>
                <div class="selected-tags" id="selectedTagsContainer"></div>
            </div>
            <div class="modal-actions"><button class="btn btn-cancel" onclick="closeModal()">Отмена</button><button class="btn btn-submit btn-buy" id="submitBtn" onclick="processTransaction()">Выполнить</button></div>
        </div>
    </div>

    <!-- Модалка редактирования тегов -->
    <div class="modal" id="editTagsModal">
        <div class="modal-content">
            <h2>✏️ Редактировать теги</h2>
            <p style="color:#9E9E9E;margin-bottom:20px;" id="editTagsItemName"></p>
            <div class="input-group">
                <label>🏷️ Теги</label>
                <div class="tags-input-wrap">
                    <input type="text" class="tags-input" id="editTagInput" placeholder="Введите тег..." onkeydown="if(event.key==='Enter'){event.preventDefault();addEditTag();}">
                    <button class="btn-add-tag" onclick="addEditTag()">+ Добавить</button>
                </div>
                <div class="selected-tags" id="editSelectedTagsContainer"></div>
            </div>
            <div class="modal-actions"><button class="btn btn-cancel" onclick="closeEditTagsModal()">Отмена</button><button class="btn btn-submit btn-buy" onclick="saveTags()">💾 Сохранить</button></div>
        </div>
    </div>

    <div class="modal" id="confirmClearModal">
        <div class="modal-content">
            <h2>🗑️ Подтверждение</h2>
            <p style="color:#E8E6F0;margin-bottom:20px;font-size:1.1em;" id="confirmClearText"></p>
            <p style="color:#FF9100;margin-bottom:25px;font-size:0.9em;" id="confirmClearDetail"></p>
            <div class="modal-actions"><button class="btn btn-cancel" onclick="closeConfirmClear()">Отмена</button><button class="btn btn-submit btn-spend" onclick="executeClear()" style="background:linear-gradient(135deg,#FF6D00,#FF9100);">🗑️ Выбить с полки</button></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        var API_URL = 'https://hookah-api.onrender.com/api';
        var authToken = ''; var currentUser = null; var currentMode = 'buy';
        var allItems = []; var allTags = []; var selectedFilterTag = null;
        var currentTags = []; var editTags = []; var editItemId = null; var clearTarget = null;

        var savedToken = localStorage.getItem('hookah_token');
        var savedUser = localStorage.getItem('hookah_user');
        if (savedToken && savedUser) { authToken = savedToken; currentUser = JSON.parse(savedUser); showApp(); }

        function showToast(m, e) { var t = document.getElementById('toast'); t.textContent = m; t.className = 'toast' + (e ? ' error' : '') + ' show'; setTimeout(function() { t.classList.remove('show'); }, 3000); }

        async function login() {
            var u = document.getElementById('loginUsername').value.trim();
            var p = document.getElementById('loginPassword').value.trim();
            var err = document.getElementById('loginError');
            if (!u || !p) { err.textContent = 'Введите логин и пароль'; err.style.display = 'block'; return; }
            try {
                var r = await fetch(API_URL + '/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
                var d = await r.json();
                if (!r.ok) { err.textContent = d.error || 'Ошибка'; err.style.display = 'block'; return; }
                authToken = d.token; currentUser = { username: d.username, role: d.role };
                localStorage.setItem('hookah_token', authToken); localStorage.setItem('hookah_user', JSON.stringify(currentUser));
                showApp();
            } catch (e) { err.textContent = 'Ошибка соединения'; err.style.display = 'block'; }
        }

        function showApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            document.getElementById('userName').textContent = currentUser.username;
            var b = document.getElementById('userBadge');
            if (currentUser.role === 'guest') {
                b.className = 'user-badge guest'; b.innerHTML = '👁️ <span id="userName">' + currentUser.username + '</span><span class="guest-badge">Только просмотр</span>';
                document.getElementById('btnBuy').disabled = true; document.getElementById('btnBuy').style.opacity = '0.4'; document.getElementById('btnBuy').style.cursor = 'not-allowed';
                document.getElementById('btnSpend').disabled = true; document.getElementById('btnSpend').style.opacity = '0.4'; document.getElementById('btnSpend').style.cursor = 'not-allowed';
            }
            checkConnection(); loadTags(); loadInventory(); loadBrands(); setInterval(checkConnection, 30000);
        }

        function logout() {
            localStorage.removeItem('hookah_token'); localStorage.removeItem('hookah_user');
            authToken = ''; currentUser = null;
            document.getElementById('appPage').style.display = 'none'; document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('loginUsername').value = ''; document.getElementById('loginPassword').value = ''; document.getElementById('loginError').style.display = 'none';
        }

        function getHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + authToken }; }

        async function checkConnection() {
            var b = document.getElementById('statusBadge');
            try { var r = await fetch(API_URL + '/health'); if (r.ok) { b.innerHTML = '🟢 Онлайн'; b.className = 'status-badge'; } else throw new Error(); }
            catch (e) { b.innerHTML = '🔴 Офлайн'; b.className = 'status-badge offline'; }
        }

        async function loadTags() {
            try { var r = await fetch(API_URL + '/tags', { headers: getHeaders() }); allTags = await r.json(); renderTagFilter(); }
            catch (e) { console.error(e); }
        }

        function renderTagFilter() {
            var c = document.getElementById('tagFilter'); var h = '';
            allTags.forEach(function(t) { h += '<button class="tag-filter-btn' + (selectedFilterTag === t.name ? ' active' : '') + '" style="border-color:' + t.color + ';color:' + t.color + '" onclick="filterByTag(\'' + escapeHtml(t.name) + '\')">' + escapeHtml(t.name) + '</button>'; });
            if (selectedFilterTag) h += '<button class="tag-filter-clear" onclick="clearTagFilter()">✕</button>';
            c.innerHTML = h;
        }

        function filterByTag(n) { selectedFilterTag = selectedFilterTag === n ? null : n; renderTagFilter(); filterInventory(); }
        function clearTagFilter() { selectedFilterTag = null; renderTagFilter(); document.getElementById('searchInput').value = ''; filterInventory(); }

        function switchTab(tab) {
            var bs = document.querySelectorAll('.tab-btn'); for (var i = 0; i < bs.length; i++) bs[i].classList.remove('active');
            document.getElementById('stockView').style.display = 'none'; document.getElementById('statsView').style.display = 'none'; document.getElementById('logView').style.display = 'none';
            if (tab === 'stock') { bs[0].classList.add('active'); document.getElementById('stockView').style.display = 'block'; loadInventory(); }
            else if (tab === 'stats') { bs[1].classList.add('active'); document.getElementById('statsView').style.display = 'block'; document.getElementById('detailView').style.display = 'none'; document.getElementById('topSpentSection').style.display = 'block'; loadStatistics(); }
            else { bs[2].classList.add('active'); document.getElementById('logView').style.display = 'block'; loadLogs(); }
        }

        async function loadInventory() {
            try { var r = await fetch(API_URL + '/inventory', { headers: getHeaders() }); allItems = await r.json(); filterInventory(); }
            catch (e) { showToast('Ошибка загрузки', true); }
        }

        function getItemTagsArray(item) {
            if (item.tagsArray && item.tagsArray.length > 0) return item.tagsArray;
            if (item.tags && item.tags.length > 0) return item.tags.split(',').filter(function(t) { return t; });
            return [];
        }

        function getTagColor(name) { var f = allTags.find(function(t) { return t.name === name; }); return f ? f.color : '#BB86FC'; }

        function filterInventory() {
            var q = document.getElementById('searchInput').value.toLowerCase();
            var filtered = allItems;
            if (q) {
                filtered = filtered.filter(function(item) {
                    if (item.brand.toLowerCase().indexOf(q) !== -1 || item.flavor.toLowerCase().indexOf(q) !== -1) return true;
                    var tags = getItemTagsArray(item);
                    for (var i = 0; i < tags.length; i++) { if (tags[i].toLowerCase().indexOf(q) !== -1) return true; }
                    return false;
                });
            }
            if (selectedFilterTag) { filtered = filtered.filter(function(item) { return getItemTagsArray(item).indexOf(selectedFilterTag) !== -1; }); }
            renderInventory(filtered);
        }

        function renderInventory(items) {
            var c = document.getElementById('inventoryContainer'); var sc = document.getElementById('stockCount');
            if (items.length === 0) { c.innerHTML = '<div style="text-align:center;padding:60px;color:#9E9E9E;grid-column:1/-1;"><p style="font-size:3em;">📭</p><p style="margin-top:15px;">Ничего не найдено</p></div>'; sc.style.display = 'none'; return; }
            var inStock = items.filter(function(i) { return i.packs > 0; });
            var outOfStock = items.filter(function(i) { return i.packs === 0; });
            var sorted = inStock.concat(outOfStock);
            if (inStock.length > 0) { sc.style.display = 'inline'; sc.textContent = inStock.length; } else { sc.style.display = 'none'; }
            var isAdmin = currentUser && currentUser.role === 'admin';
            c.innerHTML = sorted.map(function(item) {
                var tags = getItemTagsArray(item);
                var tagsHTML = '<div class="tags-container">';
                if (tags.length > 0) {
                    tagsHTML += tags.map(function(t) { var col = getTagColor(t); return '<span class="tag" style="background:' + col + '33;color:' + col + ';border:1px solid ' + col + '">' + escapeHtml(t) + '</span>'; }).join('');
                }
                if (isAdmin) {
                    tagsHTML += '<button class="tag-edit-btn" onclick="openEditTags(\'' + item.id + '\', \'' + escapeHtml(item.brand) + '\', \'' + escapeHtml(item.flavor) + '\', ' + item.weight + ')" title="Редактировать теги">✏️</button>';
                }
                tagsHTML += '</div>';
                var actionsHTML = (isAdmin && item.packs > 0) ? '<div class="card-actions"><button class="btn-sm btn-clear-one" onclick="confirmClearPosition(\'' + escapeHtml(item.brand) + '\', \'' + escapeHtml(item.flavor) + '\', ' + item.weight + ')">🗑️ Выбить эту</button><button class="btn-sm btn-clear-all" onclick="confirmClearFlavor(\'' + escapeHtml(item.brand) + '\', \'' + escapeHtml(item.flavor) + '\')">💀 Выбить вкус полностью</button></div>' : '';
                return '<div class="card ' + (item.packs === 0 ? 'out-of-stock' : '') + '">' + (item.packs === 0 ? '<span class="out-badge">ВЫБЫЛ</span>' : '') +
                    '<div class="card-header"><span class="brand">' + escapeHtml(item.brand) + '</span></div><div class="flavor">' + escapeHtml(item.flavor) + '</div>' + tagsHTML +
                    '<div class="weight-info"><span class="weight-badge">📏 ' + item.weight + 'г</span></div><div class="stock-bar">' +
                    '<div class="stock-info"><span style="color:#9E9E9E;">📦 Упаковок:</span><span class="stock-amount">' + item.packs + ' шт</span></div>' +
                    '<div class="stock-info" style="margin-top:8px;"><span style="color:#9E9E9E;">⚖️ Всего:</span><span style="color:#64FFDA;font-weight:600;">' + (item.packs * item.weight) + ' г</span></div></div>' + actionsHTML + '</div>';
            }).join('');
        }

        // ========== РЕДАКТИРОВАНИЕ ТЕГОВ ==========
        function openEditTags(id, brand, flavor, weight) {
            editItemId = id;
            document.getElementById('editTagsItemName').textContent = brand + ' "' + flavor + '" ' + weight + 'г';
            var item = allItems.find(function(i) { return i.id === id; });
            editTags = item ? getItemTagsArray(item).slice() : [];
            document.getElementById('editTagInput').value = '';
            renderEditTags();
            document.getElementById('editTagsModal').classList.add('open');
            document.getElementById('editTagInput').focus();
        }

        function closeEditTagsModal() { document.getElementById('editTagsModal').classList.remove('open'); editItemId = null; }

        function addEditTag() {
            var input = document.getElementById('editTagInput'); var val = input.value.trim();
            if (!val) return;
            if (editTags.indexOf(val) === -1) editTags.push(val);
            input.value = ''; renderEditTags(); input.focus();
        }

        function removeEditTag(index) { editTags.splice(index, 1); renderEditTags(); }

        function renderEditTags() {
            var c = document.getElementById('editSelectedTagsContainer');
            c.innerHTML = editTags.map(function(t, i) {
                var found = allTags.find(function(at) { return at.name === t; });
                var color = found ? found.color : '#BB86FC';
                return '<span class="selected-tag" style="background:' + color + '33;color:' + color + ';border:1px solid ' + color + '">' + escapeHtml(t) + '<span class="selected-tag-remove" onclick="removeEditTag(' + i + ')">✕</span></span>';
            }).join('');
        }

        async function saveTags() {
            if (!editItemId) return;
            try {
                var r = await fetch(API_URL + '/inventory/' + encodeURIComponent(editItemId) + '/tags', {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify({ tags: editTags })
                });
                var d = await r.json();
                if (!r.ok) throw new Error(d.error);
                closeEditTagsModal();
                await loadInventory();
                await loadTags();
                showToast('Теги обновлены! ✅');
            } catch (e) { showToast(e.message, true); }
        }

        function confirmClearPosition(brand, flavor, weight) {
            clearTarget = { brand: brand, flavor: flavor, weight: weight };
            document.getElementById('confirmClearText').textContent = 'Выбить позицию?';
            document.getElementById('confirmClearDetail').textContent = brand + ' "' + flavor + '" ' + weight + 'г';
            document.getElementById('confirmClearModal').classList.add('open');
        }
        function confirmClearFlavor(brand, flavor) {
            clearTarget = { brand: brand, flavor: flavor, weight: null };
            document.getElementById('confirmClearText').textContent = '💀 Выбить вкус полностью?';
            document.getElementById('confirmClearDetail').textContent = brand + ' "' + flavor + '" — ВСЕ граммовки';
            document.getElementById('confirmClearModal').classList.add('open');
        }
        function closeConfirmClear() { document.getElementById('confirmClearModal').classList.remove('open'); clearTarget = null; }
        async function executeClear() {
            if (!clearTarget) return;
            try {
                var r = await fetch(API_URL + '/clear-position', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ brand: clearTarget.brand, flavor: clearTarget.flavor, weight: clearTarget.weight }) });
                var d = await r.json(); if (!r.ok) throw new Error(d.error);
                closeConfirmClear(); await loadInventory(); showToast(d.message || 'Готово!');
            } catch (e) { showToast(e.message, true); closeConfirmClear(); }
        }

        async function loadStatistics() {
            try {
                var r = await fetch(API_URL + '/statistics', { headers: getHeaders() }); var d = await r.json();
                if (!d.stats) { document.getElementById('statsContainer').innerHTML = '<p style="color:#9E9E9E;text-align:center;">Нет данных</p>'; return; }
                document.getElementById('statsContainer').innerHTML = 
                    '<div class="stat-card" onclick="showBrandDetail()"><div class="stat-icon">🏷️</div><div class="stat-label">Брендов</div><div class="stat-value">' + (d.stats.total_brands||0) + '</div><div class="stat-hint">Нажми →</div></div>' +
                    '<div class="stat-card" onclick="showFlavorDetail()"><div class="stat-icon">🍇</div><div class="stat-label">Вкусов</div><div class="stat-value">' + (d.stats.total_flavors||0) + '</div><div class="stat-hint">Нажми →</div></div>' +
                    '<div class="stat-card" onclick="showInStockDetail()"><div class="stat-icon">✅</div><div class="stat-label">В наличии</div><div class="stat-value">' + (d.stats.in_stock_items||0) + '</div><div class="stat-hint">Нажми →</div></div>' +
                    '<div class="stat-card" onclick="showOutOfStockDetail()"><div class="stat-icon">❌</div><div class="stat-label">Выбыло</div><div class="stat-value">' + (d.stats.out_of_stock_items||0) + '</div><div class="stat-hint" style="color:#FF5252;">Нажми →</div></div>' +
                    '<div class="stat-card" onclick="showWeightDetail()"><div class="stat-icon">⚖️</div><div class="stat-label">Всего грамм</div><div class="stat-value">' + (d.stats.total_grams_in_stock||0) + 'г</div><div class="stat-hint">Нажми →</div></div>';
                var tc = document.getElementById('topSpentContainer');
                if (d.topSpent && d.topSpent.length > 0) { tc.innerHTML = d.topSpent.map(function(item, i) { return '<div class="log-entry"><span style="color:#FF9100;font-weight:700;">#' + (i+1) + '</span> <strong>' + escapeHtml(item.brand) + '</strong> — ' + escapeHtml(item.flavor) + ': <span style="color:#FF5252;">' + item.total_spent + ' уп.</span></div>'; }).join(''); }
                else { tc.innerHTML = '<p style="color:#9E9E9E;text-align:center;">Нет данных</p>'; }
            } catch (e) { console.error(e); }
        }

        function showDetail(title, data, cols) {
            document.getElementById('detailView').style.display = 'block'; document.getElementById('topSpentSection').style.display = 'none';
            document.getElementById('detailTitle').textContent = title;
            if (data.length === 0) { document.getElementById('detailContent').innerHTML = '<p style="color:#9E9E9E;text-align:center;padding:30px;">Нет данных</p>'; return; }
            var h = '<table class="detail-table"><thead><tr>';
            cols.forEach(function(c) { h += '<th>' + c.label + '</th>'; });
            h += '</tr></thead><tbody>';
            data.forEach(function(item) { h += '<tr>'; cols.forEach(function(c) { h += '<td>' + (c.render ? c.render(item) : (item[c.key] !== undefined ? item[c.key] : '-')) + '</td>'; }); h += '</tr>'; });
            h += '</tbody></table>'; document.getElementById('detailContent').innerHTML = h;
        }
        function closeDetail() { document.getElementById('detailView').style.display = 'none'; document.getElementById('topSpentSection').style.display = 'block'; }

        async function showBrandDetail() { var r = await fetch(API_URL + '/statistics/brands', { headers: getHeaders() }); showDetail('📊 Бренды', await r.json(), [{ key: 'brand', label: 'Бренд' }, { key: 'total_flavors', label: 'Вкусов' }, { key: 'total_packs', label: 'Упак.' }, { key: 'total_grams', label: 'Грамм' }, { key: 'in_stock', label: '✅' }, { key: 'out_of_stock', label: '❌' }]); }
        async function showFlavorDetail() { var r = await fetch(API_URL + '/statistics/flavors', { headers: getHeaders() }); showDetail('🍇 Вкусы', await r.json(), [{ key: 'brand', label: 'Бренд' }, { key: 'flavor', label: 'Вкус' }, { key: 'weights', label: 'Гр.' }, { key: 'total_packs', label: 'Упак.' }, { key: 'total_grams', label: 'Грамм' }]); }
        async function showInStockDetail() { var r = await fetch(API_URL + '/statistics/in-stock', { headers: getHeaders() }); showDetail('✅ В наличии', await r.json(), [{ key: 'brand', label: 'Бренд' }, { key: 'flavor', label: 'Вкус' }, { key: 'weight', label: 'Гр.' }, { key: 'packs', label: 'Упак.' }, { key: 'total', label: 'Грамм', render: function(i) { return (i.packs * i.weight) + ' г'; } }]); }
        async function showOutOfStockDetail() { var r = await fetch(API_URL + '/statistics/out-of-stock', { headers: getHeaders() }); showDetail('❌ Выбывшие', await r.json(), [{ key: 'brand', label: 'Бренд' }, { key: 'flavor', label: 'Вкус' }, { key: 'weight', label: 'Гр.' }, { key: 'status', label: 'Статус', render: function() { return '<span style="color:#FF5252;">Выбыл</span>'; } }]); }
        async function showWeightDetail() { var r = await fetch(API_URL + '/statistics/weights', { headers: getHeaders() }); showDetail('⚖️ Граммовки', await r.json(), [{ key: 'weight', label: 'Гр.' }, { key: 'total_items', label: 'Позиций' }, { key: 'total_packs', label: 'Упак.' }, { key: 'total_grams', label: 'Грамм' }, { key: 'in_stock', label: '✅' }]); }

        async function loadLogs() {
            try {
                var r = await fetch(API_URL + '/logs?limit=50', { headers: getHeaders() }); var logs = await r.json();
                var c = document.getElementById('logContainer');
                if (logs.length === 0) { c.innerHTML = '<p style="color:#9E9E9E;text-align:center;padding:50px;">Пусто</p>'; return; }
                c.innerHTML = logs.map(function(l) { return '<div class="log-entry"><span class="log-time">' + new Date(l.timestamp).toLocaleString('ru-RU') + '</span> ' + l.message + '</div>'; }).join('');
            } catch (e) { console.error(e); }
        }

        async function openModal(mode) {
            if (currentUser && currentUser.role !== 'admin') { showToast('Только для администратора', true); return; }
            currentMode = mode;
            var title = document.getElementById('modalTitle'); var submitBtn = document.getElementById('submitBtn');
            if (mode === 'buy') { title.textContent = '📥 Закуп табака'; submitBtn.className = 'btn btn-submit btn-buy'; submitBtn.textContent = 'Оприходовать'; }
            else { title.textContent = '📤 Расход табака'; submitBtn.className = 'btn btn-submit btn-spend'; submitBtn.textContent = 'Списать'; }
            document.getElementById('brandInput').value = ''; document.getElementById('flavorInput').value = '';
            document.getElementById('weightInput').value = '250'; document.getElementById('qtyInput').value = '1';
            document.getElementById('flavorList').innerHTML = '';
            currentTags = [];
            document.getElementById('tagsGroup').style.display = mode === 'buy' ? 'block' : 'none';
            document.getElementById('tagInput').value = '';
            renderSelectedTags();
            await loadBrands();
            document.getElementById('operationModal').classList.add('open');
            document.getElementById('brandInput').focus();
        }

        function closeModal() { document.getElementById('operationModal').classList.remove('open'); }

        function addTag() {
            var input = document.getElementById('tagInput'); var val = input.value.trim();
            if (!val) return;
            if (currentTags.indexOf(val) === -1) currentTags.push(val);
            input.value = ''; renderSelectedTags(); input.focus();
        }

        function removeTag(index) { currentTags.splice(index, 1); renderSelectedTags(); }

        function renderSelectedTags() {
            var c = document.getElementById('selectedTagsContainer');
            c.innerHTML = currentTags.map(function(t, i) {
                var found = allTags.find(function(at) { return at.name === t; });
                var color = found ? found.color : '#BB86FC';
                return '<span class="selected-tag" style="background:' + color + '33;color:' + color + ';border:1px solid ' + color + '">' + escapeHtml(t) + '<span class="selected-tag-remove" onclick="removeTag(' + i + ')">✕</span></span>';
            }).join('');
        }

        async function loadBrands() {
            try { var r = await fetch(API_URL + '/brands', { headers: getHeaders() }); var brands = await r.json(); document.getElementById('brandList').innerHTML = brands.map(function(b) { return '<option value="' + escapeHtml(b) + '">'; }).join(''); }
            catch (e) { console.error(e); }
        }

        document.getElementById('brandInput').addEventListener('input', async function(e) {
            var brand = e.target.value;
            if (brand.length > 0) {
                try { var r = await fetch(API_URL + '/flavors/' + encodeURIComponent(brand), { headers: getHeaders() }); var flavors = await r.json(); document.getElementById('flavorList').innerHTML = flavors.map(function(f) { return '<option value="' + escapeHtml(f) + '">'; }).join(''); }
                catch (e) { console.error(e); }
            }
        });

        async function processTransaction() {
            var brand = document.getElementById('brandInput').value.trim();
            var flavor = document.getElementById('flavorInput').value.trim();
            var weight = parseInt(document.getElementById('weightInput').value);
            var quantity = parseInt(document.getElementById('qtyInput').value);
            if (!brand || !flavor || !weight || weight <= 0 || !quantity || quantity <= 0) { showToast('Заполните все поля!', true); return; }
            var endpoint = currentMode === 'buy' ? 'buy' : 'spend';
            var body = { brand: brand, flavor: flavor, weight: weight, quantity: quantity };
            if (currentMode === 'buy') body.tags = currentTags;
            try {
                var r = await fetch(API_URL + '/' + endpoint, { method: 'POST', headers: getHeaders(), body: JSON.stringify(body) });
                var d = await r.json(); if (!r.ok) throw new Error(d.error);
                closeModal(); await loadInventory(); await loadTags(); showToast(d.message || 'Готово!');
            } catch (e) { showToast(e.message, true); }
        }

        function exportToExcel() { window.open(API_URL + '/export/excel', '_blank'); showToast('Скачивание... 📥'); }

        window.onclick = function(e) {
            if (e.target === document.getElementById('operationModal')) closeModal();
            if (e.target === document.getElementById('editTagsModal')) closeEditTagsModal();
            if (e.target === document.getElementById('confirmClearModal')) closeConfirmClear();
        };
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { closeModal(); closeEditTagsModal(); closeConfirmClear(); }
            if (e.ctrlKey && e.key === 'k') { e.preventDefault(); openModal('buy'); }
            if (e.ctrlKey && e.key === 'j') { e.preventDefault(); openModal('spend'); }
        });
        function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    </script>
</body>
</html>
