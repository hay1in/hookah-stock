<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hookah Stock Manager</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫧</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #E8E6F0;
            min-height: 100vh;
            background-attachment: fixed;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(30, 27, 46, 0.95);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(187, 134, 252, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #BB86FC, #64FFDA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            background: rgba(0, 230, 118, 0.1);
            color: #00E676;
            border: 1px solid rgba(0, 230, 118, 0.3);
        }
        .status-badge.offline {
            background: rgba(255, 82, 82, 0.1);
            color: #FF5252;
            border-color: rgba(255, 82, 82, 0.3);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(30, 27, 46, 0.9);
            backdrop-filter: blur(20px);
            padding: 6px;
            border-radius: 18px;
            border: 1px solid rgba(187, 134, 252, 0.2);
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 14px 28px;
            background: transparent;
            border: none;
            color: #9E9E9E;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95em;
            position: relative;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #BB86FC, #9966CC);
            color: white;
            box-shadow: 0 10px 25px rgba(187, 134, 252, 0.3);
        }
        .tab-btn:hover:not(.active) {
            background: rgba(187, 134, 252, 0.1);
            color: #E8E6F0;
        }
        .tab-badge {
            background: #FF5252;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 8px;
        }
        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            letter-spacing: 0.3px;
        }
        .btn-buy {
            background: linear-gradient(135deg, #00BFA5, #00E676);
            color: #0f0c29;
        }
        .btn-spend {
            background: linear-gradient(135deg, #FF5252, #FF1744);
            color: white;
        }
        .btn-export {
            background: linear-gradient(135deg, #448AFF, #2979FF);
            color: white;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }
        .btn:active {
            transform: translateY(-1px);
        }
        .search-bar {
            background: rgba(30, 27, 46, 0.9);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 25px;
            border: 1px solid rgba(187, 134, 252, 0.2);
        }
        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(19, 17, 28, 0.8);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 12px;
            color: #E8E6F0;
            font-size: 1em;
            transition: all 0.3s;
        }
        .search-input:focus {
            outline: none;
            border-color: #BB86FC;
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.2);
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 18px;
        }
        .card {
            background: rgba(30, 27, 46, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(187, 134, 252, 0.2);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #BB86FC, #64FFDA);
            transform: scaleX(0);
            transition: transform 0.4s;
        }
        .card:hover::before {
            transform: scaleX(1);
        }
        .card:hover {
            border-color: rgba(187, 134, 252, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .card.out-of-stock {
            opacity: 0.5;
            border-color: rgba(255, 82, 82, 0.3);
        }
        .card.out-of-stock::before {
            background: linear-gradient(90deg, #FF5252, #FF1744);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .brand {
            color: #BB86FC;
            font-weight: 700;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(187, 134, 252, 0.1);
            padding: 4px 12px;
            border-radius: 10px;
            display: inline-block;
        }
        .flavor {
            font-size: 1.5em;
            font-weight: 700;
            margin: 12px 0;
            line-height: 1.2;
        }
        .weight-info {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .weight-badge {
            display: inline-block;
            background: rgba(187, 134, 252, 0.15);
            padding: 6px 14px;
            border-radius: 25px;
            font-size: 0.85em;
            color: #BB86FC;
            border: 1px solid rgba(187, 134, 252, 0.3);
        }
        .stock-bar {
            background: rgba(19, 17, 28, 0.8);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }
        .stock-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-amount {
            font-size: 1.8em;
            font-weight: 700;
            background: linear-gradient(135deg, #64FFDA, #00E676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .out-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #FF5252, #FF1744);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.85em;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(255, 82, 82, 0.4);
        }
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .btn-sm {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-clear-one {
            background: rgba(255, 145, 0, 0.2);
            color: #FF9100;
            border: 1px solid rgba(255, 145, 0, 0.3);
        }
        .btn-clear-one:hover {
            background: rgba(255, 145, 0, 0.4);
            transform: scale(1.05);
        }
        .btn-clear-all {
            background: rgba(255, 82, 82, 0.2);
            color: #FF5252;
            border: 1px solid rgba(255, 82, 82, 0.3);
        }
        .btn-clear-all:hover {
            background: rgba(255, 82, 82, 0.4);
            transform: scale(1.05);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 35px;
        }
        .stat-card {
            background: rgba(30, 27, 46, 0.9);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(187, 134, 252, 0.2);
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(187, 134, 252, 0.5);
            background: rgba(40, 35, 60, 0.95);
        }
        .stat-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 2.2em;
            font-weight: 700;
            background: linear-gradient(135deg, #BB86FC, #64FFDA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
        }
        .stat-label {
            color: #9E9E9E;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-hint {
            color: #64FFDA;
            font-size: 0.75em;
            margin-top: 8px;
        }
        .stat-hint.warning {
            color: #FF5252;
        }
        .detail-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30, 27, 46, 0.9);
            border-radius: 15px;
            overflow: hidden;
        }
        .detail-table th {
            padding: 14px;
            text-align: left;
            color: #BB86FC;
            background: rgba(187, 134, 252, 0.1);
            border-bottom: 2px solid #3D2F5C;
            font-weight: 600;
        }
        .detail-table td {
            padding: 12px 14px;
            color: #E8E6F0;
            border-bottom: 1px solid #2D1F3D;
        }
        .detail-table tr:hover td {
            background: rgba(187, 134, 252, 0.05);
        }
        .log-entry {
            background: rgba(30, 27, 46, 0.9);
            backdrop-filter: blur(20px);
            padding: 16px 22px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(187, 134, 252, 0.2);
            transition: all 0.3s;
        }
        .log-entry:hover {
            background: rgba(187, 134, 252, 0.05);
        }
        .log-time {
            color: #BB86FC;
            font-weight: 600;
            margin-right: 12px;
            font-size: 0.9em;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.open {
            display: flex;
        }
        .modal-content {
            background: rgba(30, 27, 46, 0.98);
            padding: 35px;
            border-radius: 25px;
            width: 480px;
            max-width: 90%;
            border: 1px solid rgba(187, 134, 252, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }
        .modal-content h2 {
            color: #BB86FC;
            margin-bottom: 30px;
            font-size: 1.8em;
            text-align: center;
        }
        .input-group {
            margin-bottom: 25px;
        }
        .input-group label {
            display: block;
            color: #BB86FC;
            margin-bottom: 10px;
            font-size: 0.9em;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(19, 17, 28, 0.8);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 12px;
            color: #E8E6F0;
            font-size: 1em;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #BB86FC;
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.2);
        }
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(187, 134, 252, 0.3);
            color: #9E9E9E;
            flex: 1;
        }
        .btn-submit {
            flex: 2;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 230, 118, 0.95);
            color: #0f0c29;
            padding: 16px 24px;
            border-radius: 15px;
            font-weight: 600;
            transform: translateY(150%);
            transition: transform 0.4s;
            z-index: 2000;
            box-shadow: 0 10px 25px rgba(0, 230, 118, 0.3);
        }
        .toast.show {
            transform: translateY(0);
        }
        .toast.error {
            background: rgba(255, 82, 82, 0.95);
            color: white;
            box-shadow: 0 10px 25px rgba(255, 82, 82, 0.3);
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(187, 134, 252, 0.2);
            border-radius: 50%;
            border-top-color: #BB86FC;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header h1 { font-size: 1.8em; }
            .tabs { overflow-x: auto; }
            .actions { flex-direction: column; }
            .btn { justify-content: center; padding: 15px; }
            .inventory-grid { grid-template-columns: 1fr; }
            .modal-content { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>🫧 Hookah Stock Manager</h1>
                <div class="status-badge" id="statusBadge">
                    <span class="loading" style="width:12px;height:12px;border-width:2px;"></span>
                    Подключение...
                </div>
            </div>
            <p style="color:#9E9E9E;margin-top:10px;">Система управления складом табака • Учёт • Аналитика</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('stock')">
                📦 Склад
                <span class="tab-badge" id="stockCount" style="display:none;">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('stats')">📊 Статистика</button>
            <button class="tab-btn" onclick="switchTab('log')">📋 История</button>
        </div>

        <div id="stockView">
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="🔍 Поиск по бренду или вкусу..." oninput="filterInventory(this.value)">
            </div>
            <div class="actions">
                <button class="btn btn-buy" onclick="openModal('buy')">📥 Закуп</button>
                <button class="btn btn-spend" onclick="openModal('spend')">📤 Расход</button>
                <button class="btn btn-export" onclick="exportToExcel()">📥 Скачать Excel</button>
            </div>
            <div class="inventory-grid" id="inventoryContainer">
                <div style="text-align:center;padding:50px;color:#9E9E9E;grid-column:1/-1;">
                    <div class="loading"></div>
                    <p style="margin-top:20px;">Загрузка склада...</p>
                </div>
            </div>
        </div>

        <div id="statsView" style="display: none;">
            <div class="stats-grid" id="statsContainer"></div>
            <div id="detailView" style="display:none;margin-top:25px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:15px;">
                    <h3 style="color:#BB86FC;margin:0;" id="detailTitle">Детали</h3>
                    <button class="btn btn-cancel" onclick="closeDetail()" style="padding:10px 20px;font-size:0.85em;">← Назад к статистике</button>
                </div>
                <div id="detailContent" style="overflow-x:auto;"></div>
            </div>
            <div id="topSpentSection">
                <h3 style="margin:25px 0;color:#BB86FC;">🔝 Топ-10 расходуемых вкусов</h3>
                <div id="topSpentContainer"></div>
            </div>
        </div>

        <div id="logView" style="display: none;">
            <div id="logContainer">
                <div style="text-align:center;padding:50px;color:#9E9E9E;">
                    <div class="loading"></div>
                    <p style="margin-top:20px;">Загрузка истории...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="operationModal">
        <div class="modal-content">
            <h2 id="modalTitle">Операция</h2>
            <div class="input-group">
                <label>Бренд</label>
                <input type="text" id="brandInput" list="brandList" placeholder="Начните вводить или введите новый..." autocomplete="off">
                <datalist id="brandList"></datalist>
            </div>
            <div class="input-group">
                <label>Вкус</label>
                <input type="text" id="flavorInput" list="flavorList" placeholder="Выберите или введите новый..." autocomplete="off">
                <datalist id="flavorList"></datalist>
            </div>
            <div class="input-group">
                <label>Граммовка упаковки (г)</label>
                <input type="number" id="weightInput" list="weightList" placeholder="250" value="250" min="1">
                <datalist id="weightList">
                    <option value="40">
                    <option value="100">
                    <option value="200">
                    <option value="250">
                    <option value="500">
                    <option value="1000">
                </datalist>
            </div>
            <div class="input-group">
                <label>Количество упаковок</label>
                <input type="number" id="qtyInput" value="1" min="1">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn btn-submit btn-buy" id="submitBtn" onclick="processTransaction()">Выполнить</button>
            </div>
        </div>
    </div>

    <div class="modal" id="confirmClearModal">
        <div class="modal-content">
            <h2>🗑️ Подтверждение</h2>
            <p style="color:#E8E6F0;margin-bottom:20px;font-size:1.1em;" id="confirmClearText">Вы уверены, что хотите полностью списать эту позицию?</p>
            <p style="color:#FF9100;margin-bottom:25px;font-size:0.9em;" id="confirmClearDetail"></p>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeConfirmClear()">Отмена</button>
                <button class="btn btn-submit btn-spend" onclick="executeClear()" style="background:linear-gradient(135deg,#FF6D00,#FF9100);">🗑️ Выбить с полки</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = 'https://hookah-api.onrender.com/api';
        let currentMode = 'buy';
        let allItems = [];
        let clearTarget = null;

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${isError ? 'error' : ''} show`;
            setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }

        async function checkConnection() {
            const badge = document.getElementById('statusBadge');
            try {
                const response = await fetch(API_URL + '/health');
                if (response.ok) {
                    badge.innerHTML = '🟢 Онлайн';
                    badge.className = 'status-badge';
                } else {
                    throw new Error('Server error');
                }
            } catch (error) {
                badge.innerHTML = '🔴 Офлайн';
                badge.className = 'status-badge offline';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById('stockView').style.display = 'none';
            document.getElementById('statsView').style.display = 'none';
            document.getElementById('logView').style.display = 'none';

            if (tab === 'stock') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('stockView').style.display = 'block';
                loadInventory();
            } else if (tab === 'stats') {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('statsView').style.display = 'block';
                document.getElementById('detailView').style.display = 'none';
                document.getElementById('topSpentSection').style.display = 'block';
                loadStatistics();
            } else {
                document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
                document.getElementById('logView').style.display = 'block';
                loadLogs();
            }
        }

        async function loadInventory() {
            try {
                const response = await fetch(API_URL + '/inventory');
                allItems = await response.json();
                renderInventory(allItems);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                showToast('Ошибка загрузки данных', true);
            }
        }

        function renderInventory(items) {
            const container = document.getElementById('inventoryContainer');
            const stockCount = document.getElementById('stockCount');
            
            if (items.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:60px;color:#9E9E9E;grid-column:1/-1;"><p style="font-size:3em;">📭</p><p style="font-size:1.2em;margin-top:15px;">Склад пуст</p><p style="margin-top:10px;">Сделайте первый закуп!</p></div>';
                stockCount.style.display = 'none';
                return;
            }

            const inStock = items.filter(function(i) { return i.packs > 0; });
            const outOfStock = items.filter(function(i) { return i.packs === 0; });
            const sorted = inStock.concat(outOfStock);

            if (inStock.length > 0) {
                stockCount.style.display = 'inline';
                stockCount.textContent = inStock.length;
            } else {
                stockCount.style.display = 'none';
            }

            container.innerHTML = sorted.map(function(item) {
                return '<div class="card ' + (item.packs === 0 ? 'out-of-stock' : '') + '">' +
                    (item.packs === 0 ? '<span class="out-badge">ВЫБЫЛ</span>' : '') +
                    '<div class="card-header"><span class="brand">' + escapeHtml(item.brand) + '</span></div>' +
                    '<div class="flavor">' + escapeHtml(item.flavor) + '</div>' +
                    '<div class="weight-info"><span class="weight-badge">📏 ' + item.weight + 'г</span></div>' +
                    '<div class="stock-bar">' +
                    '<div class="stock-info"><span style="color:#9E9E9E;">📦 Упаковок:</span><span class="stock-amount">' + item.packs + ' шт</span></div>' +
                    '<div class="stock-info" style="margin-top:8px;"><span style="color:#9E9E9E;">⚖️ Всего:</span><span style="color:#64FFDA;font-weight:600;">' + (item.packs * item.weight) + ' г</span></div>' +
                    '</div>' +
                    (item.packs > 0 ? '<div class="card-actions">' +
                    '<button class="btn-sm btn-clear-one" onclick="confirmClearPosition(\'' + escapeHtml(item.brand) + '\', \'' + escapeHtml(item.flavor) + '\', ' + item.weight + ')">🗑️ Выбить эту</button>' +
                    '<button class="btn-sm btn-clear-all" onclick="confirmClearFlavor(\'' + escapeHtml(item.brand) + '\', \'' + escapeHtml(item.flavor) + '\')">💀 Выбить вкус полностью</button>' +
                    '</div>' : '') +
                    '</div>';
            }).join('');
        }

        function filterInventory(query) {
            if (!query) {
                renderInventory(allItems);
                return;
            }
            const filtered = allItems.filter(function(item) {
                return item.brand.toLowerCase().includes(query.toLowerCase()) ||
                       item.flavor.toLowerCase().includes(query.toLowerCase());
            });
            renderInventory(filtered);
        }

        function confirmClearPosition(brand, flavor, weight) {
            clearTarget = { brand: brand, flavor: flavor, weight: weight, type: 'position' };
            document.getElementById('confirmClearText').textContent = 'Выбить конкретную позицию?';
            document.getElementById('confirmClearDetail').textContent = brand + ' "' + flavor + '" ' + weight + 'г — все упаковки будут списаны';
            document.getElementById('confirmClearModal').classList.add('open');
        }

        function confirmClearFlavor(brand, flavor) {
            clearTarget = { brand: brand, flavor: flavor, weight: null, type: 'flavor' };
            document.getElementById('confirmClearText').textContent = '💀 Выбить вкус полностью?';
            document.getElementById('confirmClearDetail').textContent = brand + ' "' + flavor + '" — ВСЕ граммовки этого вкуса будут списаны';
            document.getElementById('confirmClearModal').classList.add('open');
        }

        function closeConfirmClear() {
            document.getElementById('confirmClearModal').classList.remove('open');
            clearTarget = null;
        }

        async function executeClear() {
            if (!clearTarget) return;
            
            const brand = clearTarget.brand;
            const flavor = clearTarget.flavor;
            const weight = clearTarget.weight;
            
            try {
                const response = await fetch(API_URL + '/clear-position', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ brand: brand, flavor: flavor, weight: weight })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error);
                }

                closeConfirmClear();
                await loadInventory();
                showToast(result.message || 'Позиция выбита! 🗑️');
            } catch (error) {
                showToast(error.message, true);
                closeConfirmClear();
            }
        }

        async function loadStatistics() {
            try {
                const response = await fetch(API_URL + '/statistics');
                const data = await response.json();
                
                if (!data.stats) {
                    document.getElementById('statsContainer').innerHTML = '<p style="color:#9E9E9E;text-align:center;grid-column:1/-1;">Нет данных</p>';
                    return;
                }

                document.getElementById('statsContainer').innerHTML = '' +
                    '<div class="stat-card" onclick="showBrandDetail()"><div class="stat-icon">🏷️</div><div class="stat-label">Брендов</div><div class="stat-value">' + (data.stats.total_brands || 0) + '</div><div class="stat-hint">Нажми для деталей →</div></div>' +
                    '<div class="stat-card" onclick="showFlavorDetail()"><div class="stat-icon">🍇</div><div class="stat-label">Вкусов</div><div class="stat-value">' + (data.stats.total_flavors || 0) + '</div><div class="stat-hint">Нажми для списка →</div></div>' +
                    '<div class="stat-card" onclick="showInStockDetail()"><div class="stat-icon">✅</div><div class="stat-label">В наличии</div><div class="stat-value">' + (data.stats.in_stock_items || 0) + '</div><div class="stat-hint">Нажми для списка →</div></div>' +
                    '<div class="stat-card" onclick="showOutOfStockDetail()"><div class="stat-icon">❌</div><div class="stat-label">Выбыло</div><div class="stat-value">' + (data.stats.out_of_stock_items || 0) + '</div><div class="stat-hint warning">Нажми для списка →</div></div>' +
                    '<div class="stat-card" onclick="showWeightDetail()"><div class="stat-icon">⚖️</div><div class="stat-label">Всего грамм</div><div class="stat-value">' + (data.stats.total_grams_in_stock || 0) + 'г</div><div class="stat-hint">По граммовкам →</div></div>';

                const topContainer = document.getElementById('topSpentContainer');
                if (data.topSpent && data.topSpent.length > 0) {
                    topContainer.innerHTML = data.topSpent.map(function(item, index) {
                        return '<div class="log-entry"><span style="color:#FF9100;font-weight:700;">#' + (index + 1) + '</span> <strong>' + escapeHtml(item.brand) + '</strong> — ' + escapeHtml(item.flavor) + ': <span style="color:#FF5252;font-weight:600;">' + item.total_spent + ' уп.</span></div>';
                    }).join('');
                } else {
                    topContainer.innerHTML = '<p style="color:#9E9E9E;text-align:center;">Нет данных о расходе</p>';
                }
            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
            }
        }

        function showDetail(title, data, columns) {
            document.getElementById('detailView').style.display = 'block';
            document.getElementById('topSpentSection').style.display = 'none';
            document.getElementById('detailTitle').textContent = title;
            
            if (data.length === 0) {
                document.getElementById('detailContent').innerHTML = '<p style="color:#9E9E9E;text-align:center;padding:30px;">Нет данных для отображения</p>';
                return;
            }
            
            var tableHTML = '<table class="detail-table"><thead><tr>';
            columns.forEach(function(col) {
                tableHTML += '<th>' + col.label + '</th>';
            });
            tableHTML += '</tr></thead><tbody>';
            
            data.forEach(function(item) {
                tableHTML += '<tr>';
                columns.forEach(function(col) {
                    var value = col.render ? col.render(item) : (item[col.key] !== undefined ? item[col.key] : '-');
                    tableHTML += '<td>' + value + '</td>';
                });
                tableHTML += '</tr>';
            });
            
            tableHTML += '</tbody></table>';
            document.getElementById('detailContent').innerHTML = tableHTML;
        }

        function closeDetail() {
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('topSpentSection').style.display = 'block';
        }

        async function showBrandDetail() {
            try {
                const response = await fetch(API_URL + '/statistics/brands');
                const data = await response.json();
                showDetail('📊 Детализация по брендам', data, [
                    { key: 'brand', label: 'Бренд' },
                    { key: 'total_flavors', label: 'Кол-во вкусов' },
                    { key: 'total_packs', label: 'Всего упаковок' },
                    { key: 'total_grams', label: 'Всего грамм' },
                    { key: 'in_stock', label: '✅ В наличии' },
                    { key: 'out_of_stock', label: '❌ Выбыло' }
                ]);
            } catch (error) {
                console.error('Ошибка:', error);
                showToast('Ошибка загрузки данных', true);
            }
        }

        async function showFlavorDetail() {
            try {
                const response = await fetch(API_URL + '/statistics/flavors');
                const data = await response.json();
                showDetail('🍇 Все вкусы', data, [
                    { key: 'brand', label: 'Бренд' },
                    { key: 'flavor', label: 'Вкус' },
                    { key: 'weights', label: 'Граммовки (г)' },
                    { key: 'total_packs', label: 'Упаковок' },
                    { key: 'total_grams', label: 'Всего грамм' }
                ]);
            } catch (error) {
                console.error('Ошибка:', error);
                showToast('Ошибка загрузки данных', true);
            }
        }

        async function showInStockDetail() {
            try {
                const response = await fetch(API_URL + '/statistics/in-stock');
                const data = await response.json();
                showDetail('✅ Позиции в наличии', data, [
                    { key: 'brand', label: 'Бренд' },
                    { key: 'flavor', label: 'Вкус' },
                    { key: 'weight', label: 'Граммовка (г)' },
                    { key: 'packs', label: 'Упаковок' },
                    { key: 'total', label: 'Всего грамм', render: function(item) { return (item.packs * item.weight) + ' г'; } }
                ]);
            } catch (error) {
                console.error('Ошибка:', error);
                showToast('Ошибка загрузки данных', true);
            }
        }

        async function showOutOfStockDetail() {
            try {
                const response = await fetch(API_URL + '/statistics/out-of-stock');
                const data = await response.json();
                showDetail('❌ Выбывшие позиции', data, [
                    { key: 'brand', label: 'Бренд' },
                    { key: 'flavor', label: 'Вкус' },
                    { key: 'weight', label: 'Граммовка (г)' },
                    { key: 'status', label: 'Статус', render: function() { return '<span style="color:#FF5252;font-weight:600;">Выбыл</span>'; } }
                ]);
            } catch (error) {
                console.error('Ошибка:', error);
                showToast('Ошибка загрузки данных', true);
            }
        }

        async function showWeightDetail() {
            try {
                const response = await fetch(API_URL + '/statistics/weights');
                const data = await response.json();
                showDetail('⚖️ Распределение по граммовкам', data, [
                    { key: 'weight', label: 'Граммовка (г)' },
                    { key: 'total_items', label: 'Кол-во позиций' },
                    { key: 'total_packs', label: 'Всего упаковок' },
                    { key: 'total_grams', label: 'Всего грамм' },
                    { key: 'in_stock', label: '✅ В наличии' }
                ]);
            } catch (error) {
                console.error('Ошибка:', error);
                showToast('Ошибка загрузки данных', true);
            }
        }

        async function loadLogs() {
            try {
                const response = await fetch(API_URL + '/logs?limit=50');
                const logs = await response.json();
                
                const container = document.getElementById('logContainer');
                if (logs.length === 0) {
                    container.innerHTML = '<p style="color:#9E9E9E;text-align:center;padding:50px;">Операций пока не было</p>';
                    return;
                }

                container.innerHTML = logs.map(function(log) {
                    return '<div class="log-entry"><span class="log-time">' + new Date(log.timestamp).toLocaleString('ru-RU') + '</span> ' + log.message + '</div>';
                }).join('');
            } catch (error) {
                console.error('Ошибка загрузки логов:', error);
            }
        }

        async function openModal(mode) {
            currentMode = mode;
            
            const modal = document.getElementById('operationModal');
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('submitBtn');
            
            if (mode === 'buy') {
                title.textContent = '📥 Закуп табака';
                submitBtn.className = 'btn btn-submit btn-buy';
                submitBtn.textContent = 'Оприходовать';
            } else {
                title.textContent = '📤 Расход табака';
                submitBtn.className = 'btn btn-submit btn-spend';
                submitBtn.textContent = 'Списать';
            }

            document.getElementById('brandInput').value = '';
            document.getElementById('flavorInput').value = '';
            document.getElementById('weightInput').value = '250';
            document.getElementById('qtyInput').value = '1';
            document.getElementById('flavorList').innerHTML = '';
            
            await loadBrands();
            modal.classList.add('open');
            document.getElementById('brandInput').focus();
        }

        function closeModal() {
            document.getElementById('operationModal').classList.remove('open');
        }

        async function loadBrands() {
            try {
                const response = await fetch(API_URL + '/brands');
                const brands = await response.json();
                document.getElementById('brandList').innerHTML = brands.map(function(b) {
                    return '<option value="' + escapeHtml(b) + '">';
                }).join('');
            } catch (error) {
                console.error('Ошибка загрузки брендов:', error);
            }
        }

        document.getElementById('brandInput').addEventListener('input', async function(e) {
            const brand = e.target.value;
            if (brand.length > 0) {
                try {
                    const response = await fetch(API_URL + '/flavors/' + encodeURIComponent(brand));
                    const flavors = await response.json();
                    document.getElementById('flavorList').innerHTML = flavors.map(function(f) {
                        return '<option value="' + escapeHtml(f) + '">';
                    }).join('');
                } catch (error) {
                    console.error('Ошибка загрузки вкусов:', error);
                }
            }
        });

        async function processTransaction() {
            const brand = document.getElementById('brandInput').value.trim();
            const flavor = document.getElementById('flavorInput').value.trim();
            const weight = parseInt(document.getElementById('weightInput').value);
            const quantity = parseInt(document.getElementById('qtyInput').value);

            if (!brand || !flavor || !weight || weight <= 0 || !quantity || quantity <= 0) {
                showToast('Заполните все поля корректно!', true);
                return;
            }

            const endpoint = currentMode === 'buy' ? 'buy' : 'spend';
            
            try {
                const response = await fetch(API_URL + '/' + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ brand: brand, flavor: flavor, weight: weight, quantity: quantity })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error);
                }

                closeModal();
                await loadInventory();
                showToast(result.message || 'Операция выполнена успешно! ✅');
            } catch (error) {
                showToast(error.message, true);
            }
        }

        function exportToExcel() {
            window.open(API_URL + '/export/excel', '_blank');
            showToast('Скачивание файла Excel... 📥');
        }

        window.onclick = function(event) {
            if (event.target === document.getElementById('operationModal')) {
                closeModal();
            }
            if (event.target === document.getElementById('confirmClearModal')) {
                closeConfirmClear();
            }
        };

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
                closeConfirmClear();
            }
            if (event.ctrlKey && event.key === 'k') {
                event.preventDefault();
                openModal('buy');
            }
            if (event.ctrlKey && event.key === 'j') {
                event.preventDefault();
                openModal('spend');
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        checkConnection();
        loadInventory();
        loadBrands();
        setInterval(checkConnection, 30000);
    </script>
</body>
</html>
