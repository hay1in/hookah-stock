<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hookah Stock Manager</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫧</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #E8E6F0;
            min-height: 100vh;
            background-attachment: fixed;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(30, 27, 46, 0.95);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(187, 134, 252, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #BB86FC, #64FFDA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            background: rgba(0, 230, 118, 0.1);
            color: #00E676;
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        .status-badge.offline {
            background: rgba(255, 82, 82, 0.1);
            color: #FF5252;
            border-color: rgba(255, 82, 82, 0.3);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(30, 27, 46, 0.9);
            backdrop-filter: blur(20px);
            padding: 6px;
            border-radius: 18px;
            border: 1px solid rgba(187, 134, 252, 0.2);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 14px 28px;
            background: transparent;
            border: none;
            color: #9E9E9E;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95em;
            position: relative;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #BB86FC, #9966CC);
            color: white;
            box-shadow: 0 10px 25px rgba(187, 134, 252, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(187, 134, 252, 0.1);
            color: #E8E6F0;
        }

        .tab-badge {
            background: #FF5252;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 8px;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            letter-spacing: 0.3px;
        }

        .btn-buy {
            background: linear-gradient(135deg, #00BFA5, #00E676);
            color: #0f0c29;
        }

        .btn-spend {
            background: linear-gradient(135deg, #FF5252, #FF1744);
            color: white;
        }

        .btn-export {
            background: linear-gradient(135deg, #448AFF, #2979FF);
            color: white;
        }

        .btn-clear {
            background: linear-gradient(135deg, #FF6D00, #FF9100);
            color: #0f0c29;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .search-bar {
            background: rgba(30, 27, 46, 0.9);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 25px;
            border: 1px solid rgba(187, 134, 252, 0.2);
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(19, 17, 28, 0.8);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 12px;
            color: #E8E6F0;
            font-size: 1em;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #BB86FC;
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.2);
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 18px;
        }

        .card {
            background: rgba(30, 27, 46, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(187, 134, 252, 0.2);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #BB86FC, #64FFDA);
            transform: scaleX(0);
            transition: transform 0.4s;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card:hover {
            border-color: rgba(187, 134, 252, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card.out-of-stock {
            opacity: 0.5;
            border-color: rgba(255, 82, 82, 0.3);
        }

        .card.out-of-stock::before {
            background: linear-gradient(90deg, #FF5252, #FF1744);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .brand {
            color: #BB86FC;
            font-weight: 700;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(187, 134, 252, 0.1);
            padding: 4px 12px;
            border-radius: 10px;
            display: inline-block;
        }

        .flavor {
            font-size: 1.5em;
            font-weight: 700;
            margin: 12px 0;
            line-height: 1.2;
        }

        .weight-info {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .weight-badge {
            display: inline-block;
            background: rgba(187, 134, 252, 0.15);
            padding: 6px 14px;
            border-radius: 25px;
            font-size: 0.85em;
            color: #BB86FC;
            border: 1px solid rgba(187, 134, 252, 0.3);
        }

        .stock-bar {
            background: rgba(19, 17, 28, 0.8);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }

        .stock-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stock-amount {
            font-size: 1.8em;
            font-weight: 700;
            background: linear-gradient(135deg, #64FFDA, #00E676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .out-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #FF5252, #FF1744);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.85em;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(255, 82, 82, 0.4);
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-sm {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-clear-one {
            background: rgba(255, 145, 0, 0.2);
            color: #FF9100;
            border: 1px solid rgba(255, 145, 0, 0.3);
        }

        .btn-clear-one:hover {
            background: rgba(255, 145, 0, 0.4);
            transform: scale(1.05);
        }

        .btn-clear-all {
            background: rgba(255, 82, 82, 0.2);
            color: #FF5252;
            border: 1px solid rgba(255, 82, 82, 0.3);
        }

        .btn-clear-all:hover {
            background: rgba(255, 82, 82, 0.4);
            transform: scale(1.05);
        }

        /* СТАТИСТИКА */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: rgba(30, 27, 46, 0.9);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(187, 134, 252, 0.2);
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(187, 134, 252, 0.5);
            background: rgba(40, 35, 60, 0.95);
        }

        .stat-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.2em;
            font-weight: 700;
            background: linear-gradient(135deg, #BB86FC, #64FFDA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
        }

        .stat-label {
            color: #9E9E9E;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-hint {
            color: #64FFDA;
            font-size: 0.75em;
            margin-top: 8px;
        }

        .stat-hint.warning {
            color: #FF5252;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30, 27, 46, 0.9);
            border-radius: 15px;
            overflow: hidden;
        }

        .detail-table th {
            padding: 14px;
            text-align: left;
            color: #BB86FC;
            background: rgba(187, 134, 252, 0.1);
            border-bottom: 2px solid #3D2F5C;
            font-weight: 600;
        }

        .detail-table td {
            padding: 12px 14px;
            color: #E8E6F0;
            border-bottom: 1px solid #2D1F3D;
        }

        .detail-table tr:hover td {
            background: rgba(187, 134, 252, 0.05);
        }

        .log-entry {
            background: rgba(30, 27, 46, 0.9);
            backdrop-filter: blur(20px);
            padding: 16px 22px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(187, 134, 252, 0.2);
            transition: all 0.3s;
        }

        .log-entry:hover {
            background: rgba(187, 134, 252, 0.05);
        }

        .log-time {
            color: #BB86FC;
            font-weight: 600;
            margin-right: 12px;
            font-size: 0.9em;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 27, 46, 0.98);
            padding: 35px;
            border-radius: 25px;
            width: 480px;
            max-width: 90%;
            border: 1px solid rgba(187, 134, 252, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .modal-content h2 {
            color: #BB86FC;
            margin-bottom: 30px;
            font-size: 1.8em;
            text-align: center;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            color: #BB86FC;
            margin-bottom: 10px;
            font-size: 0.9em;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(19, 17, 28, 0.8);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 12px;
            color: #E8E6F0;
            font-size: 1em;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #BB86FC;
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.2);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(187, 134, 252, 0.3);
            color: #9E9E9E;
            flex: 1;
        }

        .btn-submit {
            flex: 2;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 230, 118, 0.95);
            color: #0f0c29;
            padding: 16px 24px;
            border-radius: 15px;
            font-weight: 600;
            transform: translateY(150%);
            transition: transform 0.4s;
            z-index: 2000;
            box-shadow: 0 10px 25px rgba(0, 230, 118, 0.3);
        }

        .toast.show {
            transform: translateY(0);
        }

        .toast.error {
            background: rgba(255, 82, 82, 0.95);
            color: white;
            box-shadow: 0 10px 25px rgba(255, 82, 82, 0.3);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(187, 134, 252, 0.2);
            border-radius: 50%;
            border-top-color: #BB86FC;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .tabs {
                overflow-x: auto;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                justify-content: center;
                padding: 15px;
            }
            
            .inventory-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>🫧 Hookah Stock Manager</h1>
                <div class="status-badge" id="statusBadge">
                    <span class="loading" style="width:12px;height:12px;border-width:2px;"></span>
                    Подключение...
                </div>
            </div>
            <p style="color:#9E9E9E;margin-top:10px;">Система управления складом табака • Учёт • Аналитика</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('stock')">
                📦 Склад
                <span class="tab-badge" id="stockCount" style="display:none;">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('stats')">📊 Статистика</button>
            <button class="tab-btn" onclick="switchTab('log')">📋 История</button>
        </div>

        <!-- СКЛАД -->
        <div id="stockView">
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="🔍 Поиск по бренду или вкусу..." 
                       oninput="filterInventory(this.value)">
            </div>
            <div class="actions">
                <button class="btn btn-buy" onclick="openModal('buy')">📥 Закуп</button>
                <button class="btn btn-spend" onclick="openModal('spend')">📤 Расход</button>
                <button class="btn btn-export" onclick="exportToExcel()">📥 Скачать Excel</button>
            </div>
            <div class="inventory-grid" id="inventoryContainer">
                <div style="text-align:center;padding:50px;color:#9E9E9E;grid-column:1/-1;">
                    <div class="loading"></div>
                    <p style="margin-top:20px;">Загрузка склада...</p>
                </div>
            </div>
        </div>

        <!-- СТАТИСТИКА -->
        <div id="statsView" style="display: none;">
            <div class="stats-grid" id="statsContainer"></div>
            
            <div id="detailView" style="display:none; margin-top: 25px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:15px;">
                    <h3 style="color: #BB86FC; margin:0;" id="detailTitle">Детали</h3>
                    <button class="btn btn-cancel" onclick="closeDetail()" style="padding:10px 20px; font-size:0.85em;">
                        ← Назад к статистике
                    </button>
                </div>
                <div id="detailContent" style="overflow-x:auto;"></div>
            </div>
            
            <div id="topSpentSection">
                <h3 style="margin: 25px 0; color: #BB86FC;">🔝 Топ-10 расходуемых вкусов</h3>
                <div id="topSpentContainer"></div>
            </div>
        </div>

        <!-- ИСТОРИЯ -->
        <div id="logView" style="display: none;">
            <div id="logContainer">
                <div style="text-align:center;padding:50px;color:#9E9E9E;">
                    <div class="loading"></div>
                    <p style="margin-top:20px;">Загрузка истории...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ЗАКУП/РАСХОД -->
    <div class="modal" id="operationModal">
        <div class="modal-content">
            <h2 id="modalTitle">Операция</h2>
            
            <div class="input-group">
                <label>Бренд</label>
                <input type="text" id="brandInput" list="brandList" 
                       placeholder="Начните вводить или введите новый..." autocomplete="off">
                <datalist id="brandList"></datalist>
            </div>

            <div class="input-group">
                <label>Вкус</label>
                <input type="text" id="flavorInput" list="flavorList" 
                       placeholder="Выберите или введите новый..." autocomplete="off">
                <datalist id="flavorList"></datalist>
            </div>

            <div class="input-group">
                <label>Граммовка упаковки (г)</label>
                <input type="number" id="weightInput" list="weightList" 
                       placeholder="250" value="250" min="1">
                <datalist id="weightList">
                    <option value="40">
                    <option value="100">
                    <option value="200">
                    <option value="250">
                    <option value="500">
                    <option value="1000">
                </datalist>
            </div>

            <div class="input-group">
                <label>Количество упаковок</label>
                <input type="number" id="qtyInput" value="1" min="1">
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn btn-submit btn-buy" id="submitBtn" onclick="processTransaction()">
                    Выполнить
                </button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ПОДТВЕРЖДЕНИЯ ВЫБИВАНИЯ -->
    <div class="modal" id="confirmClearModal">
        <div class="modal-content">
            <h2>🗑️ Подтверждение</h2>
            <p style="color:#E8E6F0; margin-bottom: 20px; font-size: 1.1em;" id="confirmClearText">
                Вы уверены, что хотите полностью списать эту позицию?
            </p>
            <p style="color:#FF9100; margin-bottom: 25px; font-size: 0.9em;" id="confirmClearDetail"></p>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeConfirmClear()">Отмена</button>
                <button class="btn btn-submit btn-spend" onclick="executeClear()" style="background: linear-gradient(135deg, #FF6D00, #FF9100);">
                    🗑️ Выбить с полки
                </button>
            </div>
        </div>
    </div>

    <!-- УВЕДОМЛЕНИЯ -->
    <div class="toast" id="toast"></div>

    <script>
        const API_URL = 'https://hookah-api.onrender.com/api';
        let currentMode = 'buy';
        let allItems = [];
        let clearTarget = null; // для хранения данных перед выбиванием

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${isError ? 'error' : ''} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        async function checkConnection() {
            const badge = document.getElementById('statusBadge');
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    badge.innerHTML = '🟢 Онлайн';
                    badge.className = 'status-badge';
                } else {
                    throw new Error('Server error');
                }
            } catch (error) {
                badge.innerHTML = '🔴 Офлайн';
                badge.className = 'status-badge offline';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('stockView').style.display = 'none';
            document.getElementById('statsView').style.display = 'none';
            document.getElementById('logView').style.display = 'none';

            if (tab === 'stock') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('stockView').style.display = 'block';
                loadInventory();
            } else if (tab === 'stats') {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('statsView').style.display = 'block';
                document.getElementById('detailView').style.display = 'none';
                document.getElementById('topSpentSection').style.display = 'block';
                loadStatistics();
            } else {
                document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
                document.getElementById('logView').style.display = 'block';
                loadLogs();
            }
        }

        async function loadInventory() {
            try {
                const response = await fetch(`${API_URL}/inventory`);
                allItems = await response.json();
                renderInventory(allItems);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                showToast('Ошибка загрузки данных', true);
            }
